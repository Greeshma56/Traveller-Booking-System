<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manali Gallery</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    img {
      width: 70%;
      max-width: 600px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Manali Trip Gallery</h2>

  <img id="galleryImg" src="manali1.jpg">

  <br>

  <button onclick="prev()">⬅ Prev</button>
  <button onclick="next()">Next ➡</button>

  <script>
    let images = [
      "manali1.jpg",
      "manali2.jpg",
      "manali3.jpg",
      "manali4.jpg",
      "manali5.jpg",
      "manali6.jpg",
      "manali7.jpg"
    ];

    let index = 0;

    function next() {
      index = (index + 1) % images.length;
      document.getElementById("galleryImg").src = images[index];
    }

    function prev() {
      index = (index - 1 + images.length) % images.length;
      document.getElementById("galleryImg").src = images[index];
    }
  </script>

</body>
</html>
